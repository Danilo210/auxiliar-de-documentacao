<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formatador de Números</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            background: #2e7d32;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        .output {
            margin-top: 20px;
        }

        .output textarea {
            background: #f9f9f9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Formatador de Números</h2>

    <p>Cole os números abaixo (um por linha ou separados):</p>
    <textarea id="input"></textarea>

    <button onclick="formatar()">Formatar</button>

    <div class="output">
        <p>Resultado:</p>
        <textarea id="output" readonly></textarea>
    </div>
</div>

<script>
    function formatar() {
        const texto = document.getElementById("input").value;

        const resultado = texto
            .split(/\s+/)            // separa por espaços e quebras de linha
            .filter(n => n.trim() !== "")
            .map(n => n.replace(/[.,]/g, "")) // remove ponto e vírgula
            .join(", ");              // junta com vírgula + espaço

        document.getElementById("output").value = resultado;
    }
</script>

</body>
</html>
